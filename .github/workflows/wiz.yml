name: Wiz Enriched Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  wiz-scan:
    name: Wiz Container Scan + Code Scanning Upload
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # Setup
      # ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install tabulate

      - name: Download and install wizcli
        run: |
          curl -o wizcli https://wizcli.app.wiz.io/latest/wizcli
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/

      - name: Authenticate wizcli
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

      # ─────────────────────────────────────────────────────────────
      # Source Code SCA Scan (secrets, dependencies)
      # ─────────────────────────────────────────────────────────────
      - name: Wiz directory scan (SCA)
        run: |
          wizcli dir scan --path . -f sarif -o dir.sarif
          ls -la dir.sarif

      # ─────────────────────────────────────────────────────────────
      # IaC Scan (Dockerfile misconfigurations)
      # ─────────────────────────────────────────────────────────────
      - name: Wiz IaC scan (Dockerfile)
        run: |
          wizcli iac scan --path Dockerfile -f sarif -o dockerfile.sarif
          ls -la dockerfile.sarif

      # ─────────────────────────────────────────────────────────────
      # Build container image for scanning
      # ─────────────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t wiz-vuln-demo:latest .

      # ─────────────────────────────────────────────────────────────
      # Container Image Scan — Two outputs:
      #   1. SARIF for GitHub upload
      #   2. JSON with layer info for policy filter + beautification
      # ─────────────────────────────────────────────────────────────
      - name: Wiz container image scan (SARIF)
        run: |
          wizcli docker scan \
            --image wiz-vuln-demo:latest \
            --policy-hits-only \
            --policies "Zee-Container-Security" \
            -f sarif \
            -o image.sarif
          ls -la image.sarif

      - name: Wiz container image scan (per-layer JSON)
        run: |
          wizcli docker scan \
            --image wiz-vuln-demo:latest \
            --driver mountWithLayers \
            --policies "Zee-Container-Security" \
            -f json \
            -o image-layers.json
          ls -la image-layers.json

      - name: Fix file ownership
        run: |
          sudo chown -R $(whoami):$(whoami) . || true
          ls -la *.sarif *.json 2>/dev/null

      # ─────────────────────────────────────────────────────────────
      # Process SARIFs: V2 filter + beautification
      #   Applies filter: Failed + hasExploit + hasFix
      #   Adds rich titles, tags, helpUri to image.sarif
      # ─────────────────────────────────────────────────────────────
      - name: Enrich and apply V2 filter
        run: |
          echo "::group::📊 Wiz Scan Summary"
          python .github/workflows/wizsarif.py
          echo "::endgroup::"

      # ─────────────────────────────────────────────────────────────
      # Upload to GitHub Code Scanning
      # ─────────────────────────────────────────────────────────────
      - name: Upload SCA SARIF
        if: always() && hashFiles('dir.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dir.sarif
          category: wiz-sca

      - name: Upload IaC SARIF
        if: always() && hashFiles('dockerfile.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dockerfile.sarif
          category: wiz-iac

      - name: Upload Image SARIF
        if: always() && hashFiles('image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image.sarif
          category: wiz-image
